namespace: solr

example-solr:
  defines: runnable
  inherits: solr/base

  metadata:
    name: Apache Solr Dependency Example Server
    description: |
      Solr service instance used by the dependency example. It demonstrates
      how application templates can inherit the reusable base and keep Solr
      private on the Monk network.
    tags: solr, search, dependency, example
    website: https://solr.apache.org/
    source: https://github.com/apache/solr
    publisher: monk.io
    private: false

  variables:
    solr-core:
      type: string
      env: SOLR_CORE
      value: example
      description: Initial Solr core created for the dependency example.
    storage-volume-name:
      type: string
      value: solr-example
      description: Monk volume subdirectory used for dependency example Solr data.

  checks:
    readiness:
      code: http-get-service("solr/example-solr", "solr", "/solr/admin/info/system?wt=json") get-member("status") 200 equal?
      period: 10
      initialDelay: 30
      attempts: 30

example-client:
  defines: runnable

  metadata:
    name: Apache Solr Dependency Example Client
    description: |
      Small HTTP verifier representing an application that depends on Solr.
      It reads Solr connection details from Monk connections and exposes
      /health for local proof.
    tags: solr, search, dependency, example, healthcheck
    website: https://solr.apache.org/
    source: https://github.com/apache/solr
    publisher: monk.io
    private: false

  variables:
    solr-host:
      type: string
      env: SOLR_HOST
      value: <- connection-hostname("solr")
      description: Solr hostname read from the Monk connection.
    solr-port:
      type: int
      env: SOLR_PORT
      value: <- connection-port("solr")
      description: Solr port read from the Monk connection.
    health-port:
      type: int
      env: HEALTH_PORT
      value: 8088
      description: HTTP health service port inside the verifier container.
    health-host-port:
      type: int
      value: 18984
      description: Non-privileged host port published for local dependency example verification.

  containers:
    health:
      image: python
      image-tag: 3.13-alpine
      restart: unless-stopped
      bash: |
        python - <<'PY'
        import json
        import os
        import urllib.request
        from http.server import BaseHTTPRequestHandler, HTTPServer

        solr_host = os.environ.get("SOLR_HOST", "127.0.0.1")
        solr_port = int(os.environ.get("SOLR_PORT", "8983"))
        health_port = int(os.environ.get("HEALTH_PORT", "8088"))

        def solr_ok():
            url = f"http://{solr_host}:{solr_port}/solr/admin/info/system?wt=json"
            with urllib.request.urlopen(url, timeout=5) as response:
                return response.status == 200

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path != "/health":
                    self.send_response(404)
                    self.end_headers()
                    return
                try:
                    ok = solr_ok()
                except Exception:
                    ok = False
                self.send_response(200 if ok else 503)
                self.send_header("content-type", "application/json")
                self.end_headers()
                payload = {"status": "ok" if ok else "error"}
                self.wfile.write((json.dumps(payload) + "\n").encode())

            def log_message(self, fmt, *args):
                return

        HTTPServer(("0.0.0.0", health_port), Handler).serve_forever()
        PY

  services:
    health:
      container: health
      port: <- $health-port
      protocol: tcp
      publish: true
      host-port: <- $health-host-port
      description: Published local HTTP endpoint that reports connected Solr readiness.

  connections:
    solr:
      runnable: solr/example-solr
      service: solr

  depends:
    wait-for:
      runnables:
        - solr/example-solr
      timeout: 240

  checks:
    readiness:
      code: http-get-service("solr/example-client", "health", "/health") get-member("status") 200 equal?
      period: 10
      initialDelay: 10
      attempts: 30

example:
  defines: process-group

  metadata:
    name: Apache Solr Dependency Example
    description: |
      Component composition example that deploys a private Solr service and
      a connected verifier application using Monk connections.
    tags: solr, search, dependency, example
    website: https://solr.apache.org/
    source: https://github.com/apache/solr
    publisher: monk.io
    private: false

  runnable-list:
    - solr/example-solr
    - solr/example-client
