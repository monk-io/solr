namespace: solr

stack:
  defines: runnable
  inherits: solr/base

  metadata:
    name: Apache Solr Standalone Stack
    description: |
      Production-oriented single-node Apache Solr stack with persistent
      storage and no public network exposure by default. Consumers connect
      over Monk connections or inherit this stack to add authenticated
      ingress appropriate for their environment.
    tags: solr, apache, lucene, search, standalone, production
    website: https://solr.apache.org/
    source: https://github.com/apache/solr
    publisher: monk.io
    private: false

  variables:
    solr-core:
      type: string
      env: SOLR_CORE
      value: production
      description: Initial Solr core created for the standalone stack.
    solr-heap:
      type: string
      env: SOLR_HEAP
      value: 1g
      description: JVM heap size passed to production-oriented Solr stack.
    storage-volume-name:
      type: string
      value: solr-stack
      description: Monk volume subdirectory used for standalone stack Solr data.

  services:
    solr:
      container: solr
      port: <- $solr-port
      protocol: tcp
      description: Private Solr HTTP API endpoint for trusted Monk network clients.

  checks:
    readiness:
      code: http-get-service("solr/stack", "solr", "/solr/admin/info/system?wt=json") get-member("status") 200 equal?
      period: 10
      initialDelay: 30
      attempts: 30

stack-local:
  defines: runnable
  inherits: solr/base

  metadata:
    name: Apache Solr Standalone Local Stack
    description: |
      Local verification flavor for the standalone Solr stack. It publishes
      Solr on a non-privileged localhost port so external HTTP smoke tests
      can verify the deployment.
    tags: solr, apache, lucene, search, standalone, local
    website: https://solr.apache.org/
    source: https://github.com/apache/solr
    publisher: monk.io
    private: false

  variables:
    solr-core:
      type: string
      env: SOLR_CORE
      value: local
      description: Initial Solr core created for the local standalone flavor.
    storage-volume-name:
      type: string
      value: solr-stack-local
      description: Monk volume subdirectory used for local standalone Solr data.
    solr-host-port:
      type: int
      value: 18983
      description: Non-privileged host port published by the local standalone flavor.

  services:
    solr:
      container: solr
      port: <- $solr-port
      protocol: tcp
      publish: true
      host-port: <- $solr-host-port
      description: Published local Solr HTTP API endpoint for smoke testing only.

  checks:
    readiness:
      code: http-get-service("solr/stack-local", "solr", "/solr/admin/info/system?wt=json") get-member("status") 200 equal?
      period: 10
      initialDelay: 30
      attempts: 30
