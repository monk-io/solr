namespace: solr

base:
  defines: runnable

  metadata:
    name: Apache Solr
    description: |
      Reusable Apache Solr search service component. Solr is the backing
      Lucene search runtime itself and does not require another database,
      queue, or cache package for a single-node deployment.
    tags: solr, apache, lucene, search, dependency, standalone
    website: https://solr.apache.org/
    source: https://github.com/apache/solr
    publisher: monk.io
    private: false

  variables:
    solr-image-tag:
      type: string
      value: "9"
      description: Public Docker Hub solr image tag to run.
    solr-port:
      type: int
      env: SOLR_PORT
      value: 8983
      description: Solr HTTP API port inside the container and Monk network.
    solr-heap:
      type: string
      env: SOLR_HEAP
      value: 512m
      description: JVM heap size passed to Solr.
    solr-core:
      type: string
      env: SOLR_CORE
      value: gettingstarted
      description: Initial Solr core name created when the data directory is empty.
    storage-volume-name:
      type: string
      value: solr
      description: Monk volume subdirectory used for persistent Solr data.

  containers:
    solr:
      image: solr
      image-tag: <- $solr-image-tag
      restart: unless-stopped
      paths:
        - <- `${volume-path}/${storage-volume-name}:/var/solr`
      bash: |
        set -eu
        mkdir -p /var/solr/data
        exec solr-precreate "${SOLR_CORE}"

  services:
    solr:
      container: solr
      port: <- $solr-port
      protocol: tcp
      description: Private Solr HTTP API endpoint for trusted Monk network clients.

  checks:
    readiness:
      code: exec("solr", "/bin/sh", "-c", "test -d /var/solr/data && echo ready") contains?("ready")
      period: 10
      initialDelay: 30
      attempts: 30
